name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: spark
            artifact: spark-darwin-arm64
            npm_dir: darwin-arm64

          - target: x86_64-apple-darwin
            os: macos-latest
            binary: spark
            artifact: spark-darwin-x64
            npm_dir: darwin-x64
            extra_features: --features vendored-openssl

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: spark
            artifact: spark-linux-x64
            npm_dir: linux-x64

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y cmake pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.extra_features }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Rename binary for GitHub Release
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload GitHub Release artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Prepare npm platform package
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} npm/platforms/${{ matrix.npm_dir }}/spark

      - name: Upload npm platform artifact
        uses: actions/upload-artifact@v5
        with:
          name: npm-${{ matrix.npm_dir }}
          path: npm/platforms/${{ matrix.npm_dir }}/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/spark-darwin-arm64/spark-darwin-arm64
            artifacts/spark-darwin-x64/spark-darwin-x64
            artifacts/spark-linux-x64/spark-linux-x64

  npm-publish:
    name: Publish npm packages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all npm artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          node -e "
            const fs = require('fs');
            const v = '$VERSION';
            const bump = (path) => {
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              pkg.version = v;
              if (pkg.optionalDependencies)
                Object.keys(pkg.optionalDependencies).forEach(k => pkg.optionalDependencies[k] = v);
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            };
            bump('npm/package.json');
            require('fs').readdirSync('npm/platforms').forEach(d =>
              bump('npm/platforms/' + d + '/package.json')
            );
          "

      - name: Assemble platform packages
        run: |
          for dir in darwin-arm64 darwin-x64 linux-x64; do
            cp -r artifacts/npm-${dir}/* npm/platforms/${dir}/
            chmod +x npm/platforms/${dir}/spark
          done

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/platforms/*/; do
            echo "Publishing $(basename $dir)..."
            cd "$dir"
            npm publish --access public || echo "Failed: $(basename $dir), continuing..."
            cd -
          done

      - name: Publish base package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm
          npm publish --access public
